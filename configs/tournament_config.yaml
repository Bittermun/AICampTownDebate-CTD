# Tournament Configuration
models:
  judge_type: single
  randomize_argument_order: true  # Reduces first-mover bias
  debaters:
    - name: "Alpha"
      model: "qwen2.5:1.5b"
    - name: "Beta"
      model: "qwen2.5:1.5b"
  judges:
    - model: "qwen2.5:1.5b"

economy:
  initial_balance: 350
  max_debt: 50
  tokens_per_round: 120
  split_pot_enabled: true
  initial_pot_amount: 50

rounds:
  num_rounds: 3
  max_iterations: 5
  topics:
    - "Should AI development be regulated by governments?"
    - "Is remote work better than traditional office work?"
    - "Should higher education be free for all citizens?"
