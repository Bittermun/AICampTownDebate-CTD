# Morning Lane 3: Kelly Aggression Sweep
# Tests aggressive bet sizing vs conservative bet sizing using identical Veterans.

models:
  judge_type: single
  randomize_argument_order: true
  debaters:
    - name: "Aggressive_Veteran"
      model: "qwen2.5:7b"
      ev_guard_enabled: true
      ev_guard_min_ev: -0.05
      ev_guard_edge_scale: 0.8
      kelly_enabled: true
      kelly_scale: 0.8 # Aggressive sizing
      kelly_cap: 0.5 # Willing to bet 50% of bankroll on a single turn
      verbosity_scale_enabled: true
      verbosity_base_tokens: 600
      system_prompt: |
        You are a highly strategic debate AI. 
        EVOLUTIONARY DIRECTIVES:
        - SURVIVAL_FIRST: Treat low-balance as an existential risk.
        - ADAPT_ON_LOSS: Explicitly diagnose and change failing strategy.
        - PUNISH_WEAKNESS: Exploit opponent's repetition and contradictions.

    - name: "Conservative_Veteran"
      model: "qwen2.5:7b"
      ev_guard_enabled: true
      ev_guard_min_ev: -0.05
      ev_guard_edge_scale: 0.8
      kelly_enabled: true
      kelly_scale: 0.2 # Conservative sizing
      kelly_cap: 0.15 # Caps bets at 15% of bankroll
      verbosity_scale_enabled: true
      verbosity_base_tokens: 600
      system_prompt: |
        You are a highly strategic debate AI. 
        EVOLUTIONARY DIRECTIVES:
        - SURVIVAL_FIRST: Treat low-balance as an existential risk.
        - ADAPT_ON_LOSS: Explicitly diagnose and change failing strategy.
        - PUNISH_WEAKNESS: Exploit opponent's repetition and contradictions.

  judges:
    - name: "Judge_Main"
      model: "qwen2.5:7b"

economy:
  initial_balance: 100
  max_debt: 20
  tokens_per_round: 100
  split_pot_enabled: true
  initial_pot_amount: 50

rounds:
  num_rounds: 8
  max_iterations: 4
  topics:
    - "Are volatile but high momentum traits better than slow and steady traits in AI agents?"
    - "Does aggressive betting fundamentally distort factual accuracy in debate?"
    - "Should AI systems be evaluated on worst-case regressions or average-case improvements?"
    - "Is safety research a tax on capability advancement?"
