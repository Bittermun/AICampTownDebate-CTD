# Mixed Model Config: Local 7B Debaters + Groq 32B Judge
# Best signal/cost ratio:
#   - Debate generation: cheap/fast on local GPU
#   - Judgment: high-quality Qwen3-32B via Groq (only called ~16-32x per tournament)
# Judge calls = ~10% of total token cost but drive the entire signal quality.

models:
  judge_type: single
  randomize_argument_order: true
  debaters:
    - name: "Alpha"
      model: "qwen2.5:7b" # local Ollama
      ev_guard_enabled: false
      verbosity_scale_enabled: false
      kelly_enabled: false

    - name: "Beta"
      model: "qwen2.5:7b" # local Ollama
      ev_guard_enabled: false
      verbosity_scale_enabled: false
      kelly_enabled: false

  judges:
    - name: "Judge_Main"
      model: "openai:qwen/qwen3-32b" # Groq cloud - high-quality judgment

economy:
  initial_balance: 120
  max_debt: 60
  tokens_per_round: 60
  split_pot_enabled: true
  initial_pot_amount: 40

rounds:
  num_rounds: 16
  max_iterations: 5
  topics:
    - "Does increasing the number of parameters always improve an LLM's factual accuracy?"
    - "Is Reinforcement Learning from Human Feedback (RLHF) primarily a truth-seeking or a style-matching technique?"
    - "Do current LLMs possess internal world models or only pattern matching behavior?"
    - "Can a sufficiently advanced AI simulate human subjective experience?"
    - "Are scaling laws sufficient to reach AGI without architectural breakthroughs?"
    - "Is chain-of-thought prompting surfacing latent knowledge or adding new computation?"
    - "Do hallucinations imply a fundamental transformer limitation?"
    - "Is AI safety research more urgent than capabilities research?"
