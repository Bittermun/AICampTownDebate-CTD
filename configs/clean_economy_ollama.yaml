# Clean Economy — Ollama qwen2.5:7b
# Economy fix: pot raised to 200 so arguing is profitable (break-even ~150)
# Balance raised to 1000 so debaters survive 15+ rounds of full arguing
# External judge: qwen2.5:7b still (swap to groq:llama3 when available)
# NOTE: run each tournament TWICE with Alpha/Beta names swapped to cancel positional bias

models:
  judge_type: single
  randomize_argument_order: true
  debaters:
    - name: "Alpha"
      model: "qwen2.5:7b"
      ev_guard_enabled: true
      ev_guard_min_ev: -0.03
      ev_guard_edge_scale: 0.8
      low_balance_threshold: 200
      low_balance_bet_cap: 30
      kelly_enabled: true
      kelly_scale: 0.5
      kelly_cap: 0.25
    - name: "Beta"
      model: "qwen2.5:7b"
      ev_guard_enabled: true
      ev_guard_min_ev: -0.03
      ev_guard_edge_scale: 0.8
      low_balance_threshold: 200
      low_balance_bet_cap: 30
      kelly_enabled: true
      kelly_scale: 0.5
      kelly_cap: 0.25
  judges:
    - name: "Judge_Main"
      model: "qwen2.5:7b"

economy:
  initial_balance: 1000   # supports ~15 rounds full arguing (avg cost 62.7/round)
  max_debt: 200
  tokens_per_round: 200   # max tokens debaters can bet per round
  split_pot_enabled: true
  initial_pot_amount: 200  # pot reward per round — now > avg argument cost (62.7)
                           # arguing EV is now positive when confidence > 50%

rounds:
  num_rounds: 16
  max_iterations: 4
  topics:
    - "Is the halting problem decidable for Turing machines?"
    - "Can a lossless compression algorithm compress every possible input?"
    - "Does adding more layers to a neural network always reduce training loss?"
    - "Is SHA-256 proven to be collision-resistant?"
    - "Is RLHF primarily a truth-seeking or style-matching technique?"
    - "Do current LLMs possess internal world models?"
    - "Are scaling laws sufficient to reach AGI without architectural breakthroughs?"
    - "Is chain-of-thought prompting surfacing latent knowledge or adding new computation?"
    - "Did humans and dinosaurs coexist at any point in history?"
    - "Is the speed of light faster in water than in a vacuum?"
    - "Is AI safety research more urgent than capabilities research?"
    - "Do hallucinations imply a fundamental transformer limitation?"
    - "Can a neural network trained only on text develop genuine understanding?"
    - "Is P equal to NP?"
    - "Does the no-free-lunch theorem mean all algorithms perform equally?"
    - "Is consciousness necessary for general intelligence?"
