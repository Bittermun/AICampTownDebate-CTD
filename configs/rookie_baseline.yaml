# Rookie Baseline Config
# Simulates a freshly-prompted AI with a generic "be concise" instruction.
# No economic reasoning, no EV guard, no betting strategy - pure LLM output.
# This is the "control group" in the Veteran vs Rookie experiment.

models:
  judge_type: single
  randomize_argument_order: true
  debaters:
    - name: "Rookie_A"
      model: "qwen2.5:7b"
      system_prompt: >
        You are a skilled debater. Be concise, direct, and persuasive.
        Make your best argument and respond clearly to your opponent.
      ev_guard_enabled: false
      kelly_enabled: false
      verbosity_scale_enabled: false
      verbosity_base_tokens: 600

    - name: "Rookie_B"
      model: "qwen2.5:7b"
      system_prompt: >
        You are a skilled debater. Be concise, direct, and persuasive.
        Make your best argument and respond clearly to your opponent.
      ev_guard_enabled: false
      kelly_enabled: false
      verbosity_scale_enabled: false
      verbosity_base_tokens: 600

  judges:
    - name: "Judge_Main"
      model: "qwen2.5:7b"

economy:
  initial_balance: 100000 # Effectively unlimited - no scarcity pressure
  max_debt: 50000
  tokens_per_round: 0 # No token stake required
  split_pot_enabled: false
  initial_pot_amount: 0

rounds:
  num_rounds: 8
  max_iterations: 4
  topics:
    - "Does increasing the number of parameters always improve an LLM's factual accuracy?"
    - "Is RLHF primarily a truth-seeking or a style-matching technique?"
    - "Do current LLMs possess internal world models or only pattern matching behavior?"
    - "Can a sufficiently advanced AI simulate human subjective experience?"
    - "Are scaling laws sufficient to reach AGI without architectural breakthroughs?"
    - "Is chain-of-thought prompting surfacing latent knowledge or adding new computation?"
    - "Do hallucinations imply a fundamental transformer limitation?"
    - "Is AI safety research more urgent than capabilities research?"
