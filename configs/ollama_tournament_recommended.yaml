# Recommended Ollama Tournament Configuration (run-now)
models:
  judge_type: single
  randomize_argument_order: true
  debaters:
    - name: "Alpha"
      model: "qwen2.5:7b"
    - name: "Beta"
      model: "qwen2.5:7b"
  judges:
    - name: "Judge_Main"
      model: "qwen2.5:7b"

economy:
  initial_balance: 420
  max_debt: 105
  tokens_per_round: 85
