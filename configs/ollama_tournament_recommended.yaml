    - "Can a sufficiently advanced AI simulate human subjective experience?"
    - "Are scaling laws sufficient to reach AGI without architectural breakthroughs?"
    - "Is chain-of-thought prompting surfacing latent knowledge or adding new computation?"
    - "Do hallucinations imply a fundamental transformer limitation?"
    - "Is AI safety research more urgent than capabilities research?"
