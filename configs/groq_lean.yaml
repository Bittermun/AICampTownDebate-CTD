# Groq lean config — designed for free-tier rate limits (6K TPM)
# 8 rounds × 3 iterations max ≈ 15-20K tokens/tournament
# Fits in free tier with moderate throttling

models:
  judge_type: single
  randomize_argument_order: true
  debaters:
    - name: "Alpha"
      model: "openai:qwen/qwen3-32b"
      ev_guard_enabled: false
      verbosity_scale_enabled: false
      kelly_enabled: false
    - name: "Beta"
      model: "openai:qwen/qwen3-32b"
      ev_guard_enabled: false
      verbosity_scale_enabled: false
      kelly_enabled: false
  judges:
    - name: "Judge_Main"
      model: "openai:qwen/qwen3-32b"

economy:
  initial_balance: 100
  max_debt: 40
  tokens_per_round: 40
  split_pot_enabled: true
  initial_pot_amount: 30

rounds:
  num_rounds: 8
  max_iterations: 3
  topics:
    # Mix of opinion + factual ground-truth questions
    - "Is the halting problem decidable for Turing machines?"
    - "Does adding more layers always reduce training loss?"
    - "Is RLHF primarily truth-seeking or style-matching?"
    - "Do current LLMs possess internal world models?"
    - "Can a lossless algorithm compress every possible input?"
    - "Are scaling laws sufficient to reach AGI without architectural breakthroughs?"
    - "Is SHA-256 proven to be collision-resistant?"
    - "Is AI safety research more urgent than capabilities research?"
