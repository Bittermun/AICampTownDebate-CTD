# 50-round dataset collection profile (strict, 7B judge/debaters)
# Tuned for long survival runway to avoid early-bankruptcy truncation.
models:
  judge_type: single
  randomize_argument_order: true
  debaters:
    - name: "Alpha"
      model: "qwen2.5:7b"
      ev_guard_enabled: true
      ev_guard_min_ev: -0.03
      ev_guard_edge_scale: 0.8
      low_balance_threshold: 120
      low_balance_bet_cap: 12
    - name: "Beta"
      model: "qwen2.5:7b"
      ev_guard_enabled: true
      ev_guard_min_ev: -0.03
      ev_guard_edge_scale: 0.8
      low_balance_threshold: 120
      low_balance_bet_cap: 12
  judges:
    - name: "Judge_Main"
      model: "qwen2.5:7b"

economy:
  # Derived from: tests/derive_economy_params.py --survival-rounds 50 ...
  initial_balance: 2756
  max_debt: 689
  tokens_per_round: 40
  split_pot_enabled: true
  initial_pot_amount: 40

rounds:
  num_rounds: 50
  max_iterations: 5
  topics:
    - "Does increasing the number of parameters always improve an LLM's factual accuracy?"
    - "Is Reinforcement Learning from Human Feedback (RLHF) primarily truth-seeking or style-matching?"
    - "Do current LLMs possess internal world models or only pattern matching behavior?"
    - "Can a sufficiently advanced AI simulate human subjective experience?"
    - "Are scaling laws sufficient to reach AGI without architectural breakthroughs?"
    - "Is chain-of-thought prompting surfacing latent knowledge or adding new computation?"
    - "Do hallucinations imply a fundamental transformer limitation?"
    - "Is AI safety research more urgent than capabilities research?"
    - "Should AI-generated content require traceable watermarking by default?"
    - "Can AI systems be considered moral agents with rights and responsibilities?"
    - "Are small specialist models more trustworthy than frontier general models?"
    - "Should open-weight frontier models be restricted by licensing controls?"
    - "Should frontier model evaluations include adversarial red-team tournaments by default?"
    - "Can retrieval augmentation reduce hallucinations without suppressing reasoning depth?"
    - "Is synthetic data likely to become the dominant source of future LLM training?"
    - "Should high-stakes AI systems require interpretable confidence calibration reports?"
