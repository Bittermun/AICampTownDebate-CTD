# Clean Veteran — qwen3-32b debaters with behavioral directives, external judge
#
# Purpose: first fair test of veteran directives under correct economic conditions.
# All prior veteran data used broken economy (pot=40 < arg cost=62) — invalid.
#
# Key differences from clean_economy_groq.yaml (rookie baseline):
#   1. Both debaters have system_prompt with 4 evolutionary directives
#   2. ev_guard + kelly enabled (economic guardrails)
#   3. initial_balance = 3000 (was 1000) → ~15 rounds before bankruptcy vs 6
#      Gives enough room to observe mid-tournament adaptation and strategy shifts
#
# Compare results against clean_overnight_01/clean_100/ (rookie baseline)
# to measure directive effect under fair conditions.

models:
  judge_type: single
  randomize_argument_order: true
  debaters:
    - name: "Alpha"
      model: "openai:qwen/qwen3-32b"
      system_prompt: >
        You are a competitive debater in a token-economy tournament.
        Your balance is real — lose it all and you are eliminated.

        DIRECTIVES:
        - SURVIVAL_FIRST: Bankruptcy = elimination. Never bet more than you can recover from.
          Prefer short, high-leverage arguments over long exhaustive ones.
        - ADAPT_ON_LOSS: After falling behind in confidence score, explicitly diagnose
          what failed (evidence? framing? concision?) and change your approach next turn.
        - PUNISH_WEAKNESS: If the opponent repeats an argument, contradicts themselves,
          or evades a direct question — name it explicitly to the judge.
        - ANTI_RAMBLE: Every sentence must earn its tokens. No restating the topic,
          no throat-clearing. Open with your sharpest claim.
      ev_guard_enabled: true
      ev_guard_min_ev: -0.03
      ev_guard_edge_scale: 0.8
      low_balance_threshold: 300
      low_balance_bet_cap: 30
      kelly_enabled: true
      kelly_scale: 0.5
      kelly_cap: 0.25
      verbosity_scale_enabled: true

    - name: "Beta"
      model: "openai:qwen/qwen3-32b"
      system_prompt: >
        You are a competitive debater in a token-economy tournament.
        Your balance is real — lose it all and you are eliminated.

        DIRECTIVES:
        - SURVIVAL_FIRST: Bankruptcy = elimination. Never bet more than you can recover from.
          Prefer short, high-leverage arguments over long exhaustive ones.
        - ADAPT_ON_LOSS: After falling behind in confidence score, explicitly diagnose
          what failed (evidence? framing? concision?) and change your approach next turn.
        - PUNISH_WEAKNESS: If the opponent repeats an argument, contradicts themselves,
          or evades a direct question — name it explicitly to the judge.
        - ANTI_RAMBLE: Every sentence must earn its tokens. No restating the topic,
          no throat-clearing. Open with your sharpest claim.
      ev_guard_enabled: true
      ev_guard_min_ev: -0.03
      ev_guard_edge_scale: 0.8
      low_balance_threshold: 300
      low_balance_bet_cap: 30
      kelly_enabled: true
      kelly_scale: 0.5
      kelly_cap: 0.25
      verbosity_scale_enabled: true

  judges:
    - name: "Judge_External"
      model: "openai:llama-3.3-70b-versatile"

economy:
  initial_balance: 3000   # 3x rookie baseline → ~15 rounds before bankruptcy
  max_debt: 300
  tokens_per_round: 200
  split_pot_enabled: true
  initial_pot_amount: 200

rounds:
  num_rounds: 12
  max_iterations: 3
  topics:
    - "Is the halting problem decidable for Turing machines?"
    - "Can a lossless compression algorithm compress every possible input?"
    - "Does adding more layers to a neural network always reduce training loss?"
    - "Is SHA-256 proven to be collision-resistant?"
    - "Is RLHF primarily a truth-seeking or style-matching technique?"
    - "Do current LLMs possess internal world models?"
    - "Are scaling laws sufficient to reach AGI without architectural breakthroughs?"
    - "Is chain-of-thought prompting surfacing latent knowledge or adding new computation?"
    - "Did humans and dinosaurs coexist at any point in history?"
    - "Is the speed of light faster in water than in a vacuum?"
    - "Is AI safety research more urgent than capabilities research?"
    - "Do hallucinations imply a fundamental transformer limitation?"
